<header class="bg-gradient-to-r from-[#0F2B3D] to-[#1E3C72] text-white py-8 px-6 md:px-10 shadow-lg">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">

        <!-- LEFT: Identity -->
        <div class="text-center md:text-left">
            <div class="text-2xl md:text-3xl font-bold tracking-tight">
                UCPC Poetry Archive
            </div>
            <div class="urdu-text text-xl md:text-2xl mt-1 text-yellow-200">
                اردو شاعری کا تحقیقی ذخیرہ
            </div>
            <div class="text-xs md:text-sm text-gray-300 mt-2 tracking-wide">
                Urdu Computational Philology Corpus
            </div>
            <div class="text-xs md:text-sm text-gray-400 mt-1 italic tracking-wide">
                Preserving Urdu Poetry Through Digital Humanities & NLP
            </div>
        </div>

        <!-- CENTER: Stats -->
        <div class="flex gap-6 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full shadow-inner">
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_poets|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider text-gray-300">Poets</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_ghazals|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider text-gray-300">Ghazals</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_verses|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider text-gray-300">Verses</div>
            </div>
        </div>

        <!-- RIGHT: Actions (enlarged icons) -->
        <div class="flex items-center gap-4">
            <!-- Search shortcut (desktop) -->
            <a href="/search" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 transition text-sm">
                🔍 <span>Search</span>
            </a>

            <!-- Social icons – larger -->
            <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.url }}" target="_blank"
               class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#1877f2] transition">
                <i class="fab fa-facebook-f text-lg"></i>
            </a>

            <a href="https://twitter.com/intent/tweet?text=UCPC%20Poetry%20Archive&url={{ request.url }}" target="_blank"
               class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#1da1f2] transition">
                <i class="fab fa-twitter text-lg"></i>
            </a>

            <a href="https://wa.me/?text=Explore%20UCPC%20Poetry%20Archive%3A%20{{ request.url }}" target="_blank"
               class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#25d366] transition">
                <i class="fab fa-whatsapp text-lg"></i>
            </a>
        </div>

    </div>
</header>
