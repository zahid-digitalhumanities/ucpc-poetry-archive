<header class="bg-gradient-to-r from-[#0F2B3D] to-[#1E3C72] text-white py-8 px-6 md:px-10">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="text-center md:text-left">
            <div class="text-2xl md:text-3xl font-bold tracking-tight">UCPC Poetry Archive</div>
            <div class="urdu-text text-xl md:text-2xl mt-1 text-gold-light">اردو شاعری کا تحقیقی ذخیرہ</div>
            <div class="text-sm text-gray-300 mt-2 italic tracking-wide">A Research-grade Digital Archive of Urdu Poetry</div>
        </div>
        <div class="flex gap-6 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-full">
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_poets|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider">Poets</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_ghazals|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider">Ghazals</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold">{{ stats.total_verses|default(0) }}</div>
                <div class="text-xs uppercase tracking-wider">Verses</div>
            </div>
        </div>
        <div class="flex gap-3">
            <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.url }}" target="_blank" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#1877f2] transition"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com/intent/tweet?text=UCPC%20Poetry%20Archive&url={{ request.url }}" target="_blank" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#1da1f2] transition"><i class="fab fa-twitter"></i></a>
            <a href="https://wa.me/?text=Explore%20UCPC%20Poetry%20Archive%3A%20{{ request.url }}" target="_blank" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-[#25d366] transition"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</header>
