
{% extends "base.html" %}

{% block title %}Poets | UCPC{% endblock %}

{% block extra_css %}
<style>

/* ===== PAGE HEADER ===== */
.poets-header {
    text-align: center;
    margin-bottom: 40px;
}

.poets-header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    color: #1E3C72;
}

.poets-header p {
    color: #666;
    margin-top: 8px;
}

/* ===== GRID ===== */
.poets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 28px;
}

/* ===== CARD ===== */
.poet-card {
    background: white;
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    box-shadow: var(--card-shadow);
    transition: all 0.35s ease;
    text-decoration: none;
    position: relative;
    overflow: hidden;
}

.poet-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 18px 40px rgba(0,0,0,0.1);
}

/* subtle top gradient */
.poet-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, #D4AF37, #1E3C72);
}

/* ===== IMAGE ===== */
.poet-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 14px;
    border: 4px solid #f3f3f3;
    transition: 0.3s;
}

.poet-card:hover .poet-img {
    border-color: #D4AF37;
}

/* fallback */
.poet-img[src=""] {
    background: #ddd;
}

/* ===== TEXT ===== */
.poet-name-en {
    font-weight: 700;
    font-size: 1.05rem;
    color: #222;
}

.poet-name-urdu {
    font-family: 'Jameel Noori Nastaleeq';
    font-size: 1.2rem;
    margin-top: 6px;
    color: #444;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .poet-img {
        width: 90px;
        height: 90px;
    }

    .poets-header h1 {
        font-size: 1.8rem;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="poets-header">
    <h1>Explore Poets</h1>
    <p>Select a poet to explore their Ghazals</p>
</div>

<div class="poets-grid">

    {% for poet in poets %}

    <a href="/poet/{{ poet.id }}" class="poet-card">

        <!-- IMAGE -->
        <img 
            src="{{ url_for('static', filename='images/poets/poet_' ~ poet.id ~ '.jpg') }}"
            onerror="this.src='';"
            class="poet-img"
        >

        <!-- ENGLISH NAME -->
        <div class="poet-name-en">
            {{ poet.name }}
        </div>

        <!-- URDU NAME -->
        <div class="poet-name-urdu">
            {{ poet.name_urdu or '' }}
        </div>

    </a>

    {% endfor %}

</div>

{% endblock %}
