<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph (Facebook) -->
    <meta property="og:title" content="{{ ghazal.title_english or ghazal.title_urdu or 'UCPC Poetry Archive' }}">
    <meta property="og:description" content="{{ ghazal.title_urdu }} — {{ ghazal.poet_name or 'Urdu Poetry' }}">
    <meta property="og:image" content="{{ image_url }}">
    <meta property="og:image:secure_url" content="{{ image_url }}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="{{ request.url if request else '' }}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="UCPC Poetry Archive">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ ghazal.title_english or 'UCPC Ghazal' }}">
    <meta name="twitter:description" content="{{ ghazal.poet_name or 'Urdu Poetry' }}">
    <meta name="twitter:image" content="{{ image_url }}">

    <!-- Canonical -->
    <link rel="canonical" href="{{ request.url if request else '' }}">

    <title>{{ ghazal.title_english or "UCPC Ghazal" }} — UCPC Poetry Archive</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Preload Image -->
    <link rel="preload" as="image" href="{{ image_url }}">

    <style>
        :root {
            --primary-dark: #0F2B3D;
            --primary: #1E3C72;
            --gold: #D4AF37;
            --gold-light: #F5E7B2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050508;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(212,175,55,0.1);
            background: rgba(255,255,255,0.02);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
        }

        .brand-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
        }

        .home-link {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
        }

        .home-link:hover { color: var(--gold); }

        /* MAIN */
        .share-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 2rem;
        }

        .poet-info {
            text-align: center;
        }

        .poet-info .label {
            font-size: 0.7rem;
            color: rgba(212,175,55,0.5);
            text-transform: uppercase;
        }

        .poet-info .name {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
        }

        .image-wrapper {
            max-width: 680px;
            width: 100%;
        }

        .image-wrapper img {
            width: 100%;
            border-radius: 20px;
        }

        /* ACTION BUTTONS */
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .action-btn {
            padding: 0.7rem 1.4rem;
            border-radius: 50px;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-download { background: var(--gold); color: black; }
        .btn-facebook { background: #1877f2; color: white; }
        .btn-twitter { background: #1da1f2; color: white; }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn-view { background: rgba(255,255,255,0.1); color: white; }

        /* FOOTER */
        .share-footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>

<body>

<div class="top-bar">
    <a href="/" class="brand">
        <div class="brand-icon"><i class="fas fa-feather-alt"></i></div>
        <span class="brand-text">UCPC</span>
    </a>
    <a href="/" class="home-link">← Back</a>
</div>

<div class="share-content">

    <div class="poet-info">
        <div class="label">Shared from UCPC</div>
        {% if ghazal.poet_name %}
        <div class="name">{{ ghazal.poet_name }}</div>
        {% endif %}
    </div>

    <div class="image-wrapper">
        <img src="{{ image_url }}" alt="Ghazal">
    </div>

    <div class="actions">

        <a href="{{ image_url }}" download class="action-btn btn-download">
            Download
        </a>

        <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.url | urlencode }}" target="_blank" class="action-btn btn-facebook">
            Facebook
        </a>

        <a href="https://twitter.com/intent/tweet?url={{ request.url | urlencode }}" target="_blank" class="action-btn btn-twitter">
            Twitter
        </a>

        <a href="https://wa.me/?text={{ request.url | urlencode }}" target="_blank" class="action-btn btn-whatsapp">
            WhatsApp
        </a>

        <a href="/view/{{ ghazal.id }}" class="action-btn btn-view">
            Read Full
        </a>

    </div>

</div>

<div class="share-footer">
    UCPC Poetry Archive • Preserving Urdu Poetry
</div>

</body>
</html>
