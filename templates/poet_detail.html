{% extends "base.html" %}

{% block title %}Decorative Card — {{ ghazal.title_urdu or 'UCPC Ghazal' }}{% endblock %}

{% block extra_css %}
<!-- FontAwesome (IMPORTANT FIX) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* (YOUR FULL CSS SAME — NO CHANGE NEEDED) */
</style>
{% endblock %}

{% block content %}
<div style="max-width:660px; margin:0 auto;">

    <!-- CONTROLS -->
    <div class="controls-bar">
        <button class="ctrl-btn ctrl-download" onclick="downloadCard()">
            <i class="fas fa-download"></i> Download
        </button>

        <a target="_blank"
           href="https://wa.me/?text={{ request.url }}"
           class="ctrl-btn ctrl-share wa">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a target="_blank"
           href="https://www.facebook.com/sharer/sharer.php?u={{ request.url | urlencode }}"
           class="ctrl-btn ctrl-share fb">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>

        <a target="_blank"
           href="https://www.linkedin.com/sharing/share-offsite/?url={{ request.url | urlencode }}"
           class="ctrl-btn ctrl-share li">
            <i class="fab fa-linkedin-in"></i> LinkedIn
        </a>

        <button class="ctrl-btn ctrl-reading" onclick="toggleReadingMode()">
            <i class="fas fa-book-reader"></i> Reading
        </button>
    </div>

    <!-- YOUR FULL CARD HTML SAME AS BEFORE -->
    <!-- (NO CHANGE — KEEP EXACT SAME DESIGN) -->

    <!-- DEDICATION FORM -->
    <div class="dedication-form-section">
        <div class="ded-label">Add Dedication (optional)</div>
        <div class="ded-form-row">
            <input type="text" id="dedFrom" class="ded-input" placeholder="Your Name">
            <input type="text" id="dedTo" class="ded-input" placeholder="Dedicate To">
        </div>
        <button class="ded-apply-btn" onclick="applyDedication()">
            <i class="fas fa-heart"></i> Apply Dedication
        </button>
    </div>

</div>

<canvas id="cardCanvas" style="display:none;"></canvas>

<!-- ✅ FINAL WORKING JS -->
<script>

/// ─────────────────────────────
/// APPLY DEDICATION (FIXED)
/// ─────────────────────────────
function applyDedication() {
    const from = document.getElementById("dedFrom").value.trim();
    const to = document.getElementById("dedTo").value.trim();

    if (!from || !to) {
        alert("Please enter both names");
        return;
    }

    let container = document.getElementById("dedicationDisplay");

    if (!container) {
        container = document.createElement("div");
        container.id = "dedicationDisplay";
        container.className = "dedication-display";
        document.getElementById("cardContent").appendChild(container);
    }

    container.innerHTML = `
        <div class="ded-from">${from}</div>
        <div class="ded-arrow">↓</div>
        <div class="ded-to">${to}</div>
    `;
}


/// ─────────────────────────────
/// READING MODE
/// ─────────────────────────────
function toggleReadingMode() {
    document.body.classList.toggle("reading-mode");
}


/// ─────────────────────────────
/// DOWNLOAD CARD (WORKING)
/// ─────────────────────────────
function downloadCard() {
    const card = document.getElementById("decorativeCard");

    html2canvas(card, {
        scale: 2,
        useCORS: true
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = "ghazal-card.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

</script>

<!-- html2canvas CDN (IMPORTANT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

{% endblock %}
