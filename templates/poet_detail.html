{% extends "base.html" %}

{% block title %}{{ poet.name_urdu }} - UCPC Poetry Archive{% endblock %}

{% block content %}
<div class="container">
    <h1>{{ poet.name }} ({{ poet.name_urdu }})</h1>
    
    <div class="poems-list">
        {% for item in texts %}
        <div class="poem-item">
            <h3><a href="/ghazals/view/{{ item.id }}">{{ item.title_urdu or "Ghazal" }}</a></h3>
            <p>{{ item.verse_count or 0 }} verses</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
