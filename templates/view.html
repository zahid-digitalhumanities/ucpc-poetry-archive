l{% extends "base.html" %}

{% block content %}

<div class="ghazal-card">

    <h2 class="urdu-text">{{ ghazal.title_urdu }}</h2>

    {% for verse in verses %}
    <div class="verse-item">

        <div class="urdu-couplet">
            {{ verse.misra1_urdu }}<br>
            {{ verse.misra2_urdu }}
        </div>

        <div class="english-couplet">
            {{ verse.misra1_english or '' }}<br>
            {{ verse.misra2_english or '' }}
        </div>

    </div>
    {% endfor %}

    <!-- Facebook Share -->
    <div style="text-align:center; margin-top:20px;">
        <div class="fb-share-button"
             data-href="https://ucpc-poetry-archive.onrender.com/view/{{ ghazal.id }}"
             data-layout="button_count">
        </div>
    </div>

</div>

{% endblock %}
