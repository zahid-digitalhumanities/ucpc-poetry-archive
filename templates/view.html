{% extends "base.html" %}

{% block content %}

<div class="ghazal-card">

    <h2 class="urdu-text">{{ ghazal.title_urdu }}</h2>

    {% for verse in verses %}
    <div class="verse-item">

        <!-- ✅ ONE LINE COUPLET -->
        <div class="urdu-couplet">
            {{ verse.misra1_urdu }} &nbsp;&nbsp;&nbsp;
            {{ verse.misra2_urdu }}
        </div>

    </div>
    {% endfor %}

    <!-- Facebook Share -->
    <div style="text-align:center; margin-top:20px;">
        <div class="fb-share-button"
             data-href="https://ucpc-poetry-archive.onrender.com/share/{{ ghazal.id }}"
             data-layout="button">
        </div>
    </div>

</div>

{% endblock %}
