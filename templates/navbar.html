<script>
    function goBack() {
        if (document.referrer && document.referrer !== "") {
            window.history.back();
        } else {
            window.location.href = "/";
        }
    }

    // Random Ghazal functionality
    document.addEventListener('DOMContentLoaded', function() {
        const randomBtn = document.getElementById('randomGhazalBtn');
        if (randomBtn) {
            randomBtn.addEventListener('click', async function(e) {
                e.preventDefault();
                try {
                    const response = await fetch('/api/random-ghazal');
                    if (!response.ok) throw new Error('Failed to fetch random ghazal');
                    const data = await response.json();
                    if (data.id) {
                        window.location.href = `/ghazals/view/${data.id}`;
                    } else {
                        alert('No ghazals found in the archive.');
                    }
                } catch (err) {
                    console.error(err);
                    alert('Could not load random ghazal. Please try again later.');
                }
            });
        }
    });
</script>
