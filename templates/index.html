<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav>
    <a href="/" class="nav-link">Home</a>
    <a href="/poets" class="nav-link">Poets</a>
    <a href="/ghazals" class="nav-link">Ghazals</a>
</nav>

<!-- Stats -->
<section>
    <h2>📊 Archive Stats</h2>
    <p>Total Poets: {{ stats.poets or 0 }}</p>
    <p>Total Ghazals: {{ stats.ghazals or 0 }}</p>
</section>

<!-- Poets Grid -->
<section>
    <h2>👤 Featured Poets</h2>

    <div class="grid">
        {% for poet in poets %}
        <div class="card">

            <img src="{{ url_for('static', filename='images/poets/' + (poet.image_filename or 'default.jpg')) }}"
                 onerror="this.src='/static/images/default.jpg'">

            <h3>{{ poet.name_urdu }}</h3>
            <p>{{ poet.name_english }}</p>

            <a href="/poet/{{ poet.id }}">View</a>

        </div>
        {% endfor %}
    </div>

</section>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
